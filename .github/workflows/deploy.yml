name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build-and-deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      # 1. 先に安定版（v4）で Node.js v22 を確実にセットアップ
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # 2. 次に pnpm をセットアップ
      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10
          run_install: false

      # 3. 依存関係をインストール
      - name: Install dependencies
        run: pnpm install

      # 4. ブログの画面をビルド（書き出し）
      - name: Run Astro build
        run: pnpm build

      # 5. GitHub Pagesへ公開するための処理
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4