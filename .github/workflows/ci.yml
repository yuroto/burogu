name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  lint:
    name: Check for build and type issues
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v7

      # 1. 先に安定版の v4 を使って Node.js v22 を確実にセットアップします
      - name: Setup node
        uses: actions/setup-node@v6
        with:
          node-version: 22

      # 2. 次に pnpm をセットアップします
      - name: Install pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10
          run_install: false

      # 3. 依存関係をインストールします
      - name: Install dependencies
        run: pnpm install

      # 4. 画面を書き出します（エラーを起こす astro check は削除しました）
      - name: Run Astro build
        run: pnpm build